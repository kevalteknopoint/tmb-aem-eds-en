<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
  body {
    display: none;
  }
  body.appear {
    display: block;
  }
</style>

<script>
  (function() {
    // Helper function to get metadata content
    function getMeta(name) {
      const attr = name.includes(":") ? "property" : "name";
      const meta = document.querySelector(`meta[${attr}="${name}"]`);
      return meta ? meta.content : "";
    }

    // Resolve values
    const theme = getMeta("theme") || 'tmb';
    const favicon = getMeta("favicon") || '/favicon.ico';
    const stylesheet = `/styles/${theme}/styles.css`;

    // Inject tags directly into the document stream
    document.write(`<link rel="icon" href="${favicon}">`);
    document.write(`<link rel="stylesheet" href="${stylesheet}">`);
  })();
</script>
<script src="/scripts/aem.js" type="module"></script>
<script src="/scripts/scripts.js" type="module"></script>
<script>
  const launchScript = document.createElement('script');
  launchScript.src = `${getMetadata("analytics-script") || 'https://assets.adobedtm.com/fb921698a526/6931f2c56d94/launch-10ebe48cc381-development.min.js'}`;
  document.head.appendChild(launchScript);
</script>
