<!doctype html>
<html>
  <head>
    <title>Page not found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta property="og:title" content="Page not found" />
    <style>
      header {
        min-height: 141px;
      }

      @media screen and (max-width: 768px) {
        header {
          min-height: 60px;
        }
      }

      body {
        display: none;
      }

      body.appear {
        display: block;
      }
    </style>
    
    <script type="text/javascript">
      window.isErrorPage = true;
      window.errorCode = "404";
      window.homePath = '/';

      async function copyAllMetaTags(url) {
        try {
          const res = await fetch(url, { credentials: "include" });
          const html = await res.text();

          const parser = new DOMParser();
          const doc = parser.parseFromString(html, "text/html");

          const metas = doc.querySelectorAll("meta");

          metas.forEach(meta => {
            document.head.appendChild(meta.cloneNode(true));
          });

        } catch (err) {
          console.error("Error copying meta tags:", err);
        }
      }
    </script>

    <script type="module">
      // Helper function to get metadata content
      function getMeta(name) {
        const attr = name.includes(":") ? "property" : "name";
        const meta = document.querySelector(`meta[${attr}="${name}"]`);
        return meta ? meta.content : "";
      }

      await copyAllMetaTags(window.homePath);

      (function() {
        // Resolve values
        const theme = getMeta("theme") || 'tmb';
        const favicon = getMeta("favicon") || '/favicon.ico';
        const stylesheet = `/styles/${theme}/styles.css`;

        // Inject tags directly into the document stream
        document.head.insertAdjacentHTML('beforeend', `<link rel="icon" href="${favicon}">`);
        document.head.insertAdjacentHTML('beforeend', `<link rel="stylesheet" href="${stylesheet}">`);
      })();

      (function(){
        const aemScript = document.createElement("script");
        aemScript.type = "module";
        aemScript.src = "/scripts/aem.js";
        document.head.appendChild(aemScript);

        const script = document.createElement("script");
        script.type = "module";
        script.src = "/scripts/scripts.js";
        document.head.appendChild(script);
      }())
    </script>

    <script type="module">
      import { sampleRUM } from "/scripts/aem.js";
      sampleRUM("404", { source: document.referrer });
    </script>
  </head>

  <body>
    <header></header>

    <main class="error">
      <div>
        <div class="fragment">
          <div>
            <div><a href="/tmbank/au/en/404">/content/tmb/tmbank/au/en/404</a></div>
          </div>
        </div>
      </div>
    </main>

    <footer></footer>
  </body>
</html>
